AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AYD document processing infra
Parameters:
  Environment:
    Type: String
    Default: dev
Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
Resources:
  IngestionDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName:
        Fn::Sub: ayd-ingestion-dlq-${Environment}
  IngestionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName:
        Fn::Sub: ayd-ingestion-queue-${Environment}
      VisibilityTimeout: 180
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
          - IngestionDlq
          - Arn
        maxReceiveCount: 5
  IngestionWorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: /home/jay_sharma/projects/ayd-workspace/workers/ingestion-worker
      DockerTag: python312-v1
      Dockerfile: Dockerfile
      SamResourceId: IngestionWorkerFunction
    Properties:
      PackageType: Image
      FunctionName:
        Fn::Sub: ayd-ingestion-worker-${Environment}
      Architectures:
      - x86_64
      Policies:
      - AWSLambdaSQSQueueExecutionRole
      Environment:
        Variables:
          APP_ENV:
            Ref: Environment
          LOG_LEVEL: INFO
      Events:
        IngestionQueueTrigger:
          Type: SQS
          Properties:
            Queue:
              Fn::GetAtt:
              - IngestionQueue
              - Arn
            BatchSize: 1
      ImageUri: ingestionworkerfunction:python312-v1
  OcrResultsWorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: /home/jay_sharma/projects/ayd-workspace/workers/ocr-results-worker
      DockerTag: python312-v1
      Dockerfile: Dockerfile
      SamResourceId: OcrResultsWorkerFunction
    Properties:
      PackageType: Image
      FunctionName:
        Fn::Sub: ayd-ocr-results-worker-${Environment}
      Architectures:
      - x86_64
      Environment:
        Variables:
          APP_ENV:
            Ref: Environment
          LOG_LEVEL: INFO
      ImageUri: ocrresultsworkerfunction:python312-v1
Outputs:
  IngestionQueueArn:
    Value:
      Fn::GetAtt:
      - IngestionQueue
      - Arn
  IngestionDlqArn:
    Value:
      Fn::GetAtt:
      - IngestionDlq
      - Arn
  IngestionWorkerFunctionName:
    Value:
      Ref: IngestionWorkerFunction
  OcrResultsWorkerFunctionName:
    Value:
      Ref: OcrResultsWorkerFunction
