AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AYD document processing infra
Parameters:
  Environment:
    Type: String
    Default: dev
  DocumentBucketName:
    Type: String
    Default: ayd-workspace-jay-docs
  VectorBucketName:
    Type: String
    Default: ayd-vectors-jay-dev
  VectorIndexName:
    Type: String
    Default: document-chunks
  EmbeddingModelId:
    Type: String
    Default: amazon.titan-embed-text-v2:0
  BedrockRegion:
    Type: String
    Default: ap-south-1
Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
Resources:
  IngestionDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName:
        Fn::Sub: ayd-ingestion-dlq-${Environment}
  IngestionQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName:
        Fn::Sub: ayd-ingestion-queue-${Environment}
      VisibilityTimeout: 180
      RedrivePolicy:
        deadLetterTargetArn:
          Fn::GetAtt:
          - IngestionDlq
          - Arn
        maxReceiveCount: 2
  IngestionQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
      - Ref: IngestionQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Sid: AllowS3SendMessage
          Effect: Allow
          Principal:
            Service: s3.amazonaws.com
          Action: sqs:SendMessage
          Resource:
            Fn::GetAtt:
            - IngestionQueue
            - Arn
          Condition:
            ArnEquals:
              aws:SourceArn:
                Fn::Sub: arn:aws:s3:::${DocumentBucketName}
  DocumentsBucket:
    Type: AWS::S3::Bucket
    DependsOn: IngestionQueuePolicy
    Properties:
      BucketName:
        Ref: DocumentBucketName
      CorsConfiguration:
        CorsRules:
        - AllowedOrigins:
          - http://localhost:3000
          AllowedMethods:
          - PUT
          - GET
          - HEAD
          AllowedHeaders:
          - '*'
          ExposedHeaders:
          - ETag
          MaxAge: 3000
      NotificationConfiguration:
        QueueConfigurations:
        - Event: s3:ObjectCreated:*
          Queue:
            Fn::GetAtt:
            - IngestionQueue
            - Arn
          Filter:
            S3Key:
              Rules:
              - Name: suffix
                Value: .pdf
  WorkspacesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ayd-workspaces-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: workspaceId
        AttributeType: S
      KeySchema:
      - AttributeName: workspaceId
        KeyType: HASH
  WorkspaceMembersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ayd-workspace-members-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: workspaceId
        AttributeType: S
      - AttributeName: userId
        AttributeType: S
      - AttributeName: joinedAt
        AttributeType: S
      KeySchema:
      - AttributeName: workspaceId
        KeyType: HASH
      - AttributeName: userId
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: UserWorkspacesIndex
        KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: joinedAt
          KeyType: RANGE
        Projection:
          ProjectionType: ALL
  DocumentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ayd-documents-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: workspaceId
        AttributeType: S
      - AttributeName: documentId
        AttributeType: S
      - AttributeName: storageKey
        AttributeType: S
      KeySchema:
      - AttributeName: workspaceId
        KeyType: HASH
      - AttributeName: documentId
        KeyType: RANGE
      GlobalSecondaryIndexes:
      - IndexName: DocumentStorageKeyIndex
        KeySchema:
        - AttributeName: storageKey
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  AydVectorBucket:
    Type: AWS::S3Vectors::VectorBucket
    Properties:
      VectorBucketName:
        Ref: VectorBucketName
      Tags:
      - Key: Project
        Value: AYD
      - Key: Environment
        Value:
          Ref: Environment
  AydVectorIndex:
    Type: AWS::S3Vectors::Index
    DependsOn: AydVectorBucket
    Properties:
      VectorBucketName:
        Ref: VectorBucketName
      IndexName:
        Ref: VectorIndexName
      Dimension: 1024
      DistanceMetric: cosine
      DataType: float32
      MetadataConfiguration:
        NonFilterableMetadataKeys:
        - fileName
  IngestionWorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: /home/jay_sharma/projects/ayd-workspace/workers/ingestion-worker
      DockerTag: python312-v1
      Dockerfile: Dockerfile
      SamResourceId: IngestionWorkerFunction
    Properties:
      PackageType: Image
      FunctionName:
        Fn::Sub: ayd-ingestion-worker-${Environment}
      Timeout: 180
      MemorySize: 1024
      Architectures:
      - x86_64
      Policies:
      - AWSLambdaSQSQueueExecutionRole
      - DynamoDBCrudPolicy:
          TableName:
            Ref: DocumentChunksTable
      - Statement:
        - Sid: AllowReadDocumentsBucket
          Effect: Allow
          Action:
          - s3:GetObject
          Resource:
            Fn::Sub: arn:aws:s3:::${DocumentBucketName}/*
        - Sid: AllowListDocumentsBucket
          Effect: Allow
          Action:
          - s3:ListBucket
          Resource:
            Fn::Sub: arn:aws:s3:::${DocumentBucketName}
        - Sid: AllowBedrockEmbedding
          Effect: Allow
          Action:
          - bedrock:InvokeModel
          Resource:
            Fn::Sub: arn:aws:bedrock:${BedrockRegion}::foundation-model/${EmbeddingModelId}
        - Sid: AllowAydS3VectorsAccess
          Effect: Allow
          Action:
          - s3vectors:PutVectors
          - s3vectors:GetVectors
          - s3vectors:DeleteVectors
          - s3vectors:QueryVectors
          - s3vectors:ListVectors
          Resource: '*'
        - Sid: AllowAydDynamoDbAccess
          Effect: Allow
          Action:
          - dynamodb:GetItem
          - dynamodb:PutItem
          - dynamodb:UpdateItem
          - dynamodb:DeleteItem
          - dynamodb:Query
          - dynamodb:BatchWriteItem
          Resource:
          - Fn::GetAtt:
            - WorkspacesTable
            - Arn
          - Fn::GetAtt:
            - WorkspaceMembersTable
            - Arn
          - Fn::GetAtt:
            - DocumentsTable
            - Arn
          - Fn::Sub: ${WorkspaceMembersTable.Arn}/index/UserWorkspacesIndex
          - Fn::Sub: ${DocumentsTable.Arn}/index/DocumentStorageKeyIndex
      Environment:
        Variables:
          APP_ENV:
            Ref: Environment
          LOG_LEVEL: INFO
          DOCUMENTS_BUCKET_NAME:
            Ref: DocumentBucketName
          BEDROCK_REGION:
            Ref: BedrockRegion
          EMBEDDING_MODEL_ID:
            Ref: EmbeddingModelId
          VECTOR_BUCKET_NAME:
            Ref: VectorBucketName
          VECTOR_INDEX_NAME:
            Ref: VectorIndexName
          WORKSPACES_TABLE_NAME:
            Ref: WorkspacesTable
          WORKSPACE_MEMBERS_TABLE_NAME:
            Ref: WorkspaceMembersTable
          DOCUMENTS_TABLE_NAME:
            Ref: DocumentsTable
          USER_WORKSPACES_INDEX_NAME: UserWorkspacesIndex
          DOCUMENT_STORAGE_KEY_INDEX_NAME: DocumentStorageKeyIndex
          DOCUMENT_CHUNKS_TABLE:
            Ref: DocumentChunksTable
      Events:
        IngestionQueueTrigger:
          Type: SQS
          Properties:
            Queue:
              Fn::GetAtt:
              - IngestionQueue
              - Arn
            BatchSize: 1
      ImageUri: ingestionworkerfunction:python312-v1
  OcrResultsWorkerFunction:
    Type: AWS::Serverless::Function
    Metadata:
      DockerContext: /home/jay_sharma/projects/ayd-workspace/workers/ocr-results-worker
      DockerTag: python312-v1
      Dockerfile: Dockerfile
      SamResourceId: OcrResultsWorkerFunction
    Properties:
      PackageType: Image
      FunctionName:
        Fn::Sub: ayd-ocr-results-worker-${Environment}
      Architectures:
      - x86_64
      Environment:
        Variables:
          APP_ENV:
            Ref: Environment
          LOG_LEVEL: INFO
          DOCUMENTS_BUCKET_NAME:
            Ref: DocumentBucketName
      ImageUri: ocrresultsworkerfunction:python312-v1
  DocumentChunksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: documentId
        AttributeType: S
      - AttributeName: chunkId
        AttributeType: S
      KeySchema:
      - AttributeName: documentId
        KeyType: HASH
      - AttributeName: chunkId
        KeyType: RANGE
Outputs:
  DocumentBucketName:
    Value:
      Ref: DocumentsBucket
  IngestionQueueArn:
    Value:
      Fn::GetAtt:
      - IngestionQueue
      - Arn
  IngestionDlqArn:
    Value:
      Fn::GetAtt:
      - IngestionDlq
      - Arn
  IngestionWorkerFunctionName:
    Value:
      Ref: IngestionWorkerFunction
  OcrResultsWorkerFunctionName:
    Value:
      Ref: OcrResultsWorkerFunction
  WorkspacesTableName:
    Value:
      Ref: WorkspacesTable
  WorkspaceMembersTableName:
    Value:
      Ref: WorkspaceMembersTable
  DocumentsTableName:
    Value:
      Ref: DocumentsTable
  VectorBucketName:
    Value:
      Ref: VectorBucketName
  VectorIndexName:
    Value:
      Ref: VectorIndexName
